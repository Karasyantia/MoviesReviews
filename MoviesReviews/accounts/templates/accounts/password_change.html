{% extends 'base.html' %}
{% block title %}Смена пароля{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1>Сменить пароль</h1>
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-warning">Сменить пароль</button>
            <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Удаление отзыва{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2>Вы уверены, что хотите удалить этот отзыв?</h2>
    <p class="text-muted">{{ object.text }}</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Удалить</button>
      <a href="{% url 'movie_detail' object.movie.pk %}" class="btn btn-outline-secondary">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
